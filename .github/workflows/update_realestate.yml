name: 부동산 시세 자동 갱신

on:
  schedule:
    # 매월 1일 오전 9시 (한국시간, UTC 00:00)
    - cron: '0 0 1 * *'
  workflow_dispatch:  # 수동 실행 허용

jobs:
  update-realestate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 의존성 설치
        run: pip install requests python-dateutil

      - name: 부동산 시세 수집
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
        run: python update_realestate.py

      - name: re_prices.json 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add re_prices.json
          git diff --cached --quiet || git commit -m "부동산 시세 자동 업데이트: $(date '+%Y-%m-%d %H:%M') KST"
          git push
